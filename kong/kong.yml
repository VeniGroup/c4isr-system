_format_version: "3.0"
_transform: true

services:
  - name: device-service
    url: http://device-service:8002
    routes:
      - name: device-routes
        paths:
          - /api/v1/devices
          - /api/v1/devices/
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          hour: 1000
      - name: prometheus
        config:
          status_codes: true
          latency: true
          bandwidth: true
          upstream_health: true

  - name: intelligence-service
    url: http://intelligence-service:8003
    routes:
      - name: intelligence-routes
        paths:
          - /api/v1/intelligence
          - /api/v1/intelligence/
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          hour: 1000
      - name: prometheus
        config:
          status_codes: true
          latency: true
          bandwidth: true
          upstream_health: true

  - name: communication-service
    url: http://communication-service:8004
    routes:
      - name: communication-routes
        paths:
          - /api/v1/communications
          - /api/v1/communications/
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          hour: 1000
      - name: prometheus
        config:
          status_codes: true
          latency: true
          bandwidth: true
          upstream_health: true

  - name: air-support-service
    url: http://air-support-service:8005
    routes:
      - name: air-support-routes
        paths:
          - /api/v1/air-support
          - /api/v1/air-support/
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          hour: 1000
      - name: prometheus
        config:
          status_codes: true
          latency: true
          bandwidth: true
          upstream_health: true

  - name: map-service
    url: http://map-service:8006
    routes:
      - name: map-routes
        paths:
          - /api/v1/maps
          - /api/v1/maps/
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          hour: 1000
      - name: prometheus
        config:
          status_codes: true
          latency: true
          bandwidth: true
          upstream_health: true

  - name: user-service
    url: http://user-service:8007
    routes:
      - name: user-routes
        paths:
          - /api/v1/users
          - /api/v1/users/
          - /api/v1/auth
          - /api/v1/auth/
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          hour: 1000
      - name: prometheus
        config:
          status_codes: true
          latency: true
          bandwidth: true
          upstream_health: true

  - name: websocket-service
    url: http://communication-service:8004
    routes:
      - name: websocket-routes
        protocols:
          - ws
          - wss
        paths:
          - /ws
        strip_path: false
    plugins:
      - name: prometheus
        config:
          status_codes: true
          latency: true
          bandwidth: true
          upstream_health: true

# Global plugins
plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Content-Type
        - Authorization
        - X-Requested-With
      exposed_headers:
        - X-Requested-With
      credentials: true
      max_age: 3600

  - name: prometheus
    config:
      status_codes: true
      latency: true
      bandwidth: true
      upstream_health: true
      http_requests: true
      http_status: true
      latency_histogram: true
