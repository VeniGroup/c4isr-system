version: '3.8'

services:
  # API Gateway
  api-gateway:
    image: kong:3.4
    container_name: c4isr-api-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./kong/kong.yml:/var/lib/kong/kong.yml:ro
    depends_on:
      - device-service
      - intelligence-service
      - communication-service
      - air-support-service
      - map-service
      - user-service
    networks:
      - c4isr-network

  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: c4isr-postgres
    environment:
      POSTGRES_DB: c4isr
      POSTGRES_USER: c4isr_user
      POSTGRES_PASSWORD: c4isr_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - c4isr-network

  # Redis for caching and real-time communication
  redis:
    image: redis:7-alpine
    container_name: c4isr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - c4isr-network

  # Device Management Service
  device-service:
    build:
      context: ./backend/device-service
      dockerfile: Dockerfile
    container_name: c4isr-device-service
    environment:
      - DATABASE_URL=postgresql://c4isr_user:c4isr_password@postgres:5432/c4isr
      - REDIS_URL=redis://redis:6379
      - SERVICE_NAME=device-service
      - SERVICE_PORT=8002
    ports:
      - "8002:8002"
    depends_on:
      - postgres
      - redis
    networks:
      - c4isr-network
    volumes:
      - ./backend/device-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload

  # Intelligence Service
  intelligence-service:
    build:
      context: ./backend/intelligence-service
      dockerfile: Dockerfile
    container_name: c4isr-intelligence-service
    environment:
      - DATABASE_URL=postgresql://c4isr_user:c4isr_password@postgres:5432/c4isr
      - REDIS_URL=redis://redis:6379
      - SERVICE_NAME=intelligence-service
      - SERVICE_PORT=8003
    ports:
      - "8003:8003"
    depends_on:
      - postgres
      - redis
    networks:
      - c4isr-network
    volumes:
      - ./backend/intelligence-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8003 --reload

  # Communication Service
  communication-service:
    build:
      context: ./backend/communication-service
      dockerfile: Dockerfile
    container_name: c4isr-communication-service
    environment:
      - DATABASE_URL=postgresql://c4isr_user:c4isr_password@postgres:5432/c4isr
      - REDIS_URL=redis://redis:6379
      - SERVICE_NAME=communication-service
      - SERVICE_PORT=8004
    ports:
      - "8004:8004"
    depends_on:
      - postgres
      - redis
    networks:
      - c4isr-network
    volumes:
      - ./backend/communication-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8004 --reload

  # Air Support Service
  air-support-service:
    build:
      context: ./backend/air-support-service
      dockerfile: Dockerfile
    container_name: c4isr-air-support-service
    environment:
      - DATABASE_URL=postgresql://c4isr_user:c4isr_password@postgres:5432/c4isr
      - REDIS_URL=redis://redis:6379
      - SERVICE_NAME=air-support-service
      - SERVICE_PORT=8005
    ports:
      - "8005:8005"
    depends_on:
      - postgres
      - redis
    networks:
      - c4isr-network
    volumes:
      - ./backend/air-support-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8005 --reload

  # Map Service
  map-service:
    build:
      context: ./backend/map-service
      dockerfile: Dockerfile
    container_name: c4isr-map-service
    environment:
      - DATABASE_URL=postgresql://c4isr_user:c4isr_password@postgres:5432/c4isr
      - REDIS_URL=redis://redis:6379
      - SERVICE_NAME=map-service
      - SERVICE_PORT=8006
    ports:
      - "8006:8006"
    depends_on:
      - postgres
      - redis
    networks:
      - c4isr-network
    volumes:
      - ./backend/map-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8006 --reload

  # User Management Service
  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: c4isr-user-service
    environment:
      - DATABASE_URL=postgresql://c4isr_user:c4isr_password@postgres:5432/c4isr
      - REDIS_URL=redis://redis:6379
      - SERVICE_NAME=user-service
      - SERVICE_PORT=8007
      - JWT_SECRET_KEY=your-super-secret-jwt-key-change-in-production
    ports:
      - "8007:8007"
    depends_on:
      - postgres
      - redis
    networks:
      - c4isr-network
    volumes:
      - ./backend/user-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8007 --reload

  # Frontend Dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: c4isr-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_GATEWAY_URL=http://localhost:8000
      - REACT_APP_WS_URL=ws://localhost:8000
    depends_on:
      - api-gateway
    networks:
      - c4isr-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm start

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: c4isr-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - c4isr-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: c4isr-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - c4isr-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  c4isr-network:
    driver: bridge
